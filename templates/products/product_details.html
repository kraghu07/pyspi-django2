<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: black;
        }
        .card {
            background-color: rgba(24, 25, 26, 0.8); /* Black background with 80% opacity */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            align-content: center;
        }
        h1 {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="card-title">Shop here!</h1>
                <div class="card">
                    <div class="card-body">
                        <img src="{{ product.image1.url }}" alt="Product Image" width="270px" height="270px"><br>
                        <p>{{ product.product.product_name }} | Color: {{ product.colour.colour_name }}</p>
                        <p>Original price: {{ product.original_price }}</p>
                        <p>Sale price: {{ product.sale_price }}</p>
                    </div>                     
                </div>
            </div>
        </div>
    </div>    
    <!-- Include Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
