{% extends 'base.html' %}

{% block title %}Products in {{ category.category_name }}{% endblock %}

{% block content %}
<h1>Products in {{ category.category_name }}</h1>
<div class="row">
    {% for product in products %}
        <div class="col-md-4">
            <div class="card">
                <img src="{{ product.product_category.category_image.url }}" class="card-img-top" alt="{{ product.product_name }}">
                <div class="card-body">
                    <h5 class="card-title">{{ product.product_name }}</h5>
                    <p class="card-text">{{ product.product_description }}</p>
                    <a href="{% url 'product_detail' product.slug %}" class="btn btn-success">View Details</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
