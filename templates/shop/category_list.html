{% extends 'base.html' %}

{% block title %}Categories{% endblock %}

{% block content %}
<h1>Categories</h1>
<div class="row">
    {% for category in categories %}
        <div class="col-md-4">
            <div class="card">
                <img src="{{ category.category_image.url }}" class="card-img-top" alt="{{ category.category_name }}">
                <div class="card-body">
                    <h5 class="card-title">{{ category.category_name }}</h5>
                    <a href="{% url 'product_list' category.slug %}" class="btn btn-primary">View Products</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
